site_name: romi-01
site_description: Personal knowledge base — Stoicism, self-reliance, continuous learning
site_url: https://romi110.github.io/romi-01/
site_dir: public
docs_dir: knowledge

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy
  font:
    text: Source Sans Pro
    code: IBM Plex Mono

plugins:
  - search:
      lang: en
  - tags:
      tags_file: tags.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - admonition

nav:
  - Home: index.md
  - Tags: tags.md
  - Hindi: hindi/
  - Art: art/
  - Consumerism: consumerism/
  - Cooking: cooking/
  - Economics: economics/
  - Energy: energy/
  - Farming: farming/
  - Finance: finance/
  - Geopolitics: geopolitics/
  - Health: health/
  - History: history/
  - Manga: manga/
  - Mathematics: mathematics/
  - Meta: meta/
  - Mind: mind/
  - New Jersey: nj/
  - Outdoors: outdoors/
  - Philosophy: philosophy/
  - Roma: roma/
  - Science: science/
  - Skills: skills/
  - Sports: sports/
  - Tech: tech/
  - Travel: travel/
  - Video: video/
  - Writing: writing/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/ticker.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Romi110/romi-01
